controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    odom_frame: odom
    base_frame_id: base_link
    global_frame: odom
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.20    # 放宽：DWA 较慢时 10s 内移动 0.2m 即视为有进度
      movement_time_allowance: 15.0   # 放宽：超时时间 15s

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.30
      yaw_goal_tolerance: 0.30
      stateful: True

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.5          
      max_linear_accel: 1.0
      max_linear_decel: -1.0
      min_x_velocity_threshold: 0.0
      lookahead_dist: 1.0
      min_lookahead_dist: 0.5
      max_lookahead_dist: 1.2 
      use_velocity_scaled_lookahead_dist: true
      use_regulated_linear_velocity_scaling: true
      use_rotate_to_heading: false
      rotate_to_heading_angular_vel: 1.8
      max_robot_pose_search_dist: 1.0

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.2
      use_astar: false
      allow_unknown: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.24
      rolling_window: false
      transform_tolerance: 0.5

      origin_x: -20.0    # 扩展以包含机器人初始位置 (0,0) 及传感器 (-0.49, 1.60)
      origin_y: -50.0
      width: 80          # 覆盖 X: [-20, 60]
      height: 60         
      resolution: 0.05
      footprint_padding: 0.03

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_persistence: 0.2
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 9.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.60
        cost_scaling_factor: 3.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_link
      robot_radius: 0.24
      rolling_window: true
      update_frequency: 15.0
      publish_frequency: 10.0
      always_send_full_costmap: true
      width: 10
      height: 10
      resolution: 0.05
      footprint_padding: 0.03
      transform_tolerance: 0.5

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        max_obstacle_height: 2.0
        observation_persistence: 0.2
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          raytrace_min_range: 0.0
          obstacle_max_range: 5.0
          obstacle_min_range: 0.20

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.70
        cost_scaling_factor: 3.8

behavior_server:
  ros__parameters:
    use_sim_time: true
    behaviors: ["spin", "back_up", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    back_up:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
